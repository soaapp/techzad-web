<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #171a19;
    font-family: 'IBM Plex Sans', sans-serif;
    color: #f2efe7;
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    padding: 64px 72px;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(1000px 500px at 88% -10%, rgba(211, 173, 98, 0.13), transparent 60%),
      #171a19;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: #d3ad62;
  }

  .head {
    display: flex;
    align-items: center;
    gap: 22px;
  }

  .mark { width: 58px; height: 58px; }

  .kicker {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #a0a5a3;
  }

  .kicker strong {
    color: #f2efe7;
    font-weight: 700;
    letter-spacing: 0.22em;
  }

  .title-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 20px 0;
  }

  .title {
    font-size: 74px;
    font-weight: 700;
    letter-spacing: -0.035em;
    line-height: 1.08;
    color: #ffffff;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .title.long { font-size: 58px; }

  .foot {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-top: 1px solid #343837;
    padding-top: 28px;
    font-size: 24px;
  }

  .date { color: #a0a5a3; font-weight: 400; }

  .site { color: #d3ad62; font-weight: 600; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <svg class="mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
        <path fill="#e8eaeb" d="M6 7h52v9H6z"/>
        <path fill="#e8eaeb" d="M20 20h11v13L20 43z"/>
        <path fill="#e8eaeb" d="M43 20h14L29 57H15z"/>
        <path fill="#e0bc7a" d="M37 45h20v12H28z"/>
      </svg>
      <div class="kicker"><strong>Techzad</strong> · Notes from the studio</div>
    </div>
    <div class="title-wrap">
      <div class="title" id="title">{{TITLE}}</div>
    </div>
    <div class="foot">
      <span class="date">{{DATE}} · Ali</span>
      <span class="site">techzad.ca/blog</span>
    </div>
  </div>
  <script>
    const t = document.getElementById("title");
    if (t.textContent.length > 60) t.classList.add("long");
  </script>
</body>
</html>
